<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ORPHAN MAKER | Recenzje</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <canvas id="particles-canvas"></canvas>

    <nav class="navbar">
        <div class="logo">INFO</div>
        <ul class="nav-links">
            <li><a href="index.html">Strona główna</a></li>
            <li><a href="ricky_lopez.html">Ricky</a></li>
            <li><a href="meet_the_band.html">Zespół</a></li>
            <li><a href="tickets.html">Bilety</a></li>
            <li><a href="reviews.html" class="active">Recenzje</a></li>
        </ul>
    </nav>

    <section class="page-header scroll-reveal">
        <h2 class="glitch error-title" data-text="Recenzje">Recenzje</h2>
        <p class="page-subtitle">Co mówią o nas fani</p>
    </section>

    <div class="neon-divider"></div>

    <!-- Review Form -->
    <section class="reviews-form-section scroll-reveal">
        <div class="review-box review-form-box">
            <h3>Napisz recenzję</h3>
            <form id="review-form">
                <div class="form-group">
                    <label for="review-author">Twoje imię</label>
                    <input type="text" id="review-author" name="author" placeholder="np. Jan Kowalski" required>
                </div>
                <div class="form-group">
                    <label for="review-location">Lokalizacja</label>
                    <div class="select-container">
                        <select id="review-location" name="location" required class="select-placeholder">
                            <option value="" disabled selected>Wybierz lokalizację...</option>
                        </select>
                    </div>
                </div>
                <div class="form-group">
                    <label for="review-content">Twoja recenzja</label>
                    <textarea id="review-content" name="content" rows="4" placeholder="Podziel się swoją opinią..." required></textarea>
                </div>
                <button type="submit" class="btn primary-btn review-submit-btn">Wyślij recenzję</button>
                <p id="form-status" class="form-status"></p>
            </form>
        </div>
    </section>

    <div class="neon-divider"></div>

    <!-- Reviews List -->
    <div class="reviews-container" id="reviews-list">
        <p class="loading-reviews">Ładowanie recenzji...</p>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="script.js"></script>
</body>
</html>
